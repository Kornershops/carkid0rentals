version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: carkid0_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-carkid0_rentals}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carkid0_network

  redis:
    image: redis:7-alpine
    container_name: carkid0_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - carkid0_network

  emqx:
    image: emqx/emqx:5.3.0
    container_name: carkid0_emqx
    ports:
      - "1883:1883"
      - "8083:8083"
      - "18083:18083"
    environment:
      EMQX_NAME: carkid0_mqtt
      EMQX_HOST: 127.0.0.1
    volumes:
      - emqx_data:/opt/emqx/data
    networks:
      - carkid0_network

  nats:
    image: nats:2.10-alpine
    container_name: carkid0_nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "--http_port 8222"
    networks:
      - carkid0_network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: carkid0_api
    environment:
      DATABASE_URL: host=postgres user=${POSTGRES_USER:-admin} password=${POSTGRES_PASSWORD:-password} dbname=${POSTGRES_DB:-carkid0_rentals} port=5432 sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-carkid0-production-secret-change-me}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      REDIS_URL: redis:6379
      MQTT_BROKER: tcp://emqx:1883
      NATS_URL: nats://nats:4222
    ports:
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - carkid0_network
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: carkid0_web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:9090/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - carkid0_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  emqx_data:

networks:
  carkid0_network:
    driver: bridge
